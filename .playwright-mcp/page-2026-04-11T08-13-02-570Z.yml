      - generic [ref=e37]: HRtep プラットフォーム
    - generic [ref=e38]:
      - generic [ref=e39]:
        - heading "外国籍人財の就労促進マッチングサービス" [level=3] [ref=e40]
        - paragraph [ref=e41]: HRtepプラットフォームは、外国籍人材の就労促進を支援するマッチングサービスで、以下の４つからなります。
        - heading "ＨＲｔｅｐ企業管理画面" [level=4] [ref=e42]
        - paragraph [ref=e43]: 企業管理画面は、雇用企業が登録・利用する管理画面で、データベースに登録されている求職者情報の検索や採用したい求職者にはトーク機能を利用して、メッセージのやり取り、また内定通知を出すこと が可能です。また自社で採用したい求人情報の登録なども行えます。
        - heading "ＨＲｔｅｐ求人情報提供者管理画面" [level=4] [ref=e44]
        - paragraph [ref=e45]: 求人情報提供者管理画面は、雇用企業の為に人材の採用支援する事業者会社が求人情報を登録する管理画面でしたり、雇用企業の代理登録を行ったりします。 またデータベースに登録されている求職者情報の検索や採用したい求職者にはトーク機能を利用して、メッセージのやり取り、また内定通知を出すこと が可能です。
        - heading "ＨＲｔｅｐ求職者情報提供者管理画面" [level=4] [ref=e46]
        - paragraph [ref=e47]: 求職者情報提供者管理画面は、就労支援する事業者会社が求職者を登録したり、データベースに登録されている求人情報の検索や応募したい求人情報提供事業者会社または雇用企業にはトーク機能を利用して、メッセージのやり取り、また内定通知を受け取った際には承諾または辞退する返信通知 が可能です。
        - heading "求職者WEB" [level=4] [ref=e48]
        - paragraph [ref=e49]: 求職者WEBは、仕事を求める個人の求職者が直接登録ができる管理画面です。
      - img "HRtepプラットフォーム" [ref=e51]
  - generic [ref=e52]:
    - generic [ref=e53]:
      - heading "System Integration" [level=2] [ref=e54]
      - generic [ref=e55]: システム統合・構築・開発・運用
    - generic [ref=e56]:
      - generic [ref=e57]:
        - heading "System Integration 事業のご紹介" [level=3] [ref=e58]
        - paragraph [ref=e59]:
          - text: ＨＲｔｅｐ株式会社は、人財活用とテクノロジーの融合により企業の持続的な成長を支えるため、「System Integration（システムインテグレーション）」事業を推進しております。
          - text: 私たちは、企業が抱える経営課題を単なる人財提供だけでなく、DXやAI技術を活用した最新のシステム構築・改善を通じて解決することが真の貢献だと考えています。 業界や企業規模、業態ごとのニーズに即した専門性の高い人財を編成し、システムの調査・分析から設計・開発・運用支援までを一貫してご提供いたします。
          - text: また、多様なバックグラウンドを持つ豊富な人財を活かし、貴社のビジョンと中長期的な成長をサポートするため、柔軟かつ拡張性の高い次世代型システムを企画・構築いたします。 私たちの提供するソリューションは、常に進化するビジネス環境や社会情勢の変化に迅速かつ確実に対応できるよう設計されています。
        - heading "サービス領域" [level=3] [ref=e60]
        - paragraph
        - list [ref=e61]:
          - listitem [ref=e62]: テクノロジーコンサルティング（IT戦略の策定・業務改善支援）
          - listitem [ref=e63]: システムインテグレーション（システム企画・構築、モダナイゼーション）
          - listitem [ref=e64]: ソフトウェアサポートサービス(ヘルプデスク・保守運用支援)
          - listitem [ref=e65]: システム運用サービス（システム運用管理、アプリケーション運用管理等）
          - listitem [ref=e66]: システム教育（オンライン、集合教育等）
        - paragraph
        - paragraph [ref=e67]:
          - text: 私たちは人財とテクノロジーを最適に融合させることで、お客様のビジネスを持続可能で競争力のある未来へ導きます。
          - text: ＨＲｔｅｐ株式会社は、常に貴社の信頼されるパートナーとして、共に発展を目指して参ります。

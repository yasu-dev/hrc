          - generic [ref=e89]:
            - heading "プロフェッショナル人材派遣（SES）" [level=3] [ref=e93]
            - paragraph [ref=e100]:
              - text: 弊社では、お客様のシステム開発、アプリ開発、ネットワーク・サーバの設計構築、運用保守、各プロジェクトに必要である技術を提供しております。
              - text: システムエンジニア、プログラマーは勿論、経験豊富なITコンサルタントなどの上流フェーズ層から、ヘルプデスク、サポート、営業要員などお客様のニーズにベストマッチする優秀な人材をご提案しております。
            - generic [ref=e108]:
              - generic [ref=e110]:
                - heading "得意分野" [level=4] [ref=e111]
                - text: 業務系・WEBアプリ開発を中心に、インフラ設計・構築、WEBマーケティング、コーディング、ITコンサルティングからサポート、営業などの幅広い分野で企業様をご支援しております。
              - generic [ref=e113]:
                - heading "プログラミング言語等" [level=4] [ref=e114]
                - text: Java、PHP等のオープン系言語をはじめ、AWSやLinux、特定の業務知識に精通したエンジニアを抱えております。
              - generic [ref=e116]:
                - heading "DX人材 All Offering" [level=4] [ref=e117]
                - text: 稼働要員の90%がDX人材
          - generic [ref=e121]:
            - heading "有料職業紹介事業" [level=3] [ref=e125]
            - heading "弊社がDXに特化した人材ビジネスを展開しているため、活かし、貴社の採用目標へ支援が可能と考えております。" [level=5] [ref=e128]
            - generic [ref=e130]:
              - heading "人材ネットワークを活用した転職希望者の集客" [level=4] [ref=e131]
              - text: 弊社はDXに特化した人材ビジネスを展開する中、独自の幅広いネットワークを活用し、求職者の確保に取り組んでいます。求職者についても単調なルーチンをこなす人材ではなく、自発的に課題を抽出し、課題解決に自発的に取り組むような人材が多いことが特徴です。
            - generic [ref=e133]:
              - heading "IUターンの実績" [level=4] [ref=e134]
              - text: 弊社のグループ会社の各拠点にて、IUターン希望者の採用実績がございます。大阪、広島、名古屋、博多、仙台、徳島、松山、札幌等の採用支援が可能です。
            - generic [ref=e136]:
              - heading "メディア活用による母集団形成の拡大" [level=4] [ref=e137]
              - text: 自社メディアと広告有料媒体を活用した求職者の集客を行っておりますので、幅広い知識/知見を活かした採用支援ができます。また、有料媒体につきましても、各媒体の特徴を活かした採用支援を行っており、御社の採用運用支援（BPO）も可能です。
            - generic [ref=e139]:
              - heading "ハイスペックな開発エンジニアが多数在籍" [level=4] [ref=e140]
              - paragraph [ref=e141]: 弊社のグループ会社の各拠点にて、IUターン希望者の採用実績がございます。大阪、広島、名古屋、博多、仙台、徳島、松山、札幌等の採用支援が可能です。
          - generic [ref=e145]:
            - heading "DX社の強み" [level=3] [ref=e149]
            - generic [ref=e151]:
              - heading "過去経験グループとしての蓄積" [level=4] [ref=e152]
              - text: IT中心の新規事業立ち上げ1,000プロジェクト15年の歴史人材プールの蓄積、洗練
            - generic [ref=e158]:
              - heading "DXコア社員をプロマネとしたBPO" [level=4] [ref=e159]
              - text: プロジェクトを主導できるプロマネを擁し、チームごと派遣・マネジメント可能
            - generic [ref=e165]:
              - heading "DX領域人材一気通貫支援" [level=4] [ref=e166]
              - text: 細分化されている領域をすべてカバーDX化の穴を埋める
            - heading "DXの特性" [level=3] [ref=e170]
            - generic [ref=e172]:
              - heading "フォロー体制充実" [level=4] [ref=e173]
              - text: 過去のプロジェクト実績に基づくアサインメントが可能です。アサインメンバーへの課題フィードバックや、出退勤管理、ご要望に応じプロジェクト管理(※費用別途)も遂行いたします。
            - generic [ref=e179]:
              - heading "ハイスペックな人材が多数在籍" [level=4] [ref=e180]
              - paragraph [ref=e181]: 弊社は事業戦略コンサル会社のグループ会社ということもあり、ハイスペックな人材の確保に取り組んでいます。単調なルーチンをこなす人材ではなく、自発的に課題を抽出し、課題解決に自発的に取り組むような人材が多いことが特徴です。
            - generic [ref=e187]:
              - heading "コンサルタントとのチーム派遣も可能" [level=4] [ref=e188]
              - paragraph [ref=e189]: プライマルグループのコンサルタントや、DX社のプロジェクトマネージャーとのチーム派遣が可能です。プロジェクト上の課題の早期発見･解決を行い、プロジェクト成果の最大化を図ります。(業務委託契約の場合は定期的な成果報告を行います)
          - generic [ref=e193]:
            - heading "新規事業プロフェッショナル集団(プライマルグループとDX社)" [level=3] [ref=e197]
            - paragraph [ref=e202]: 新規事業企画〜立ち上げ〜拡大・運用を一気通貫でサポートします。

            - paragraph [ref=e82]:
              - text: 「DX人材 AII Offering」＝DXの4Pを提供。
              - text: 価値定義：DXに必要な人材を一気通貫で提供し、DXを加速・推進可能となる。
            - link [ref=e85] [cursor=pointer]:

            - listitem [ref=e95]:
              - link "沖縄支社特設ページ" [ref=e96] [cursor=pointer]:
                - /url: https://jin-so.co.jp/okinawa-office/
          - paragraph [ref=e97]: お客様の問題を解決するという観点で、弊社は「IT」の分野でも強みを持ちます。2016年4月に設立したIT事業部では、各種システムの開発やネットワーク・サーバー設計・構築・運用保守などの専門スキルを持つ技術屋集団がITに関するお客様の問題を解決します。
          - paragraph [ref=e98]: また、自社でITエンジニア採用を積極的に行ってきた実績があるため、技術者の採用・育成のノウハウは十二分にあります。

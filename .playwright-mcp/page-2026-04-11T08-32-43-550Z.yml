        - generic [ref=e389]: OUR STRENGTHS
        - heading "私たちの強み" [level=2] [ref=e390]
        - heading "求人広告専門のベテランライターや専任のCS（カスタマーサクセス）チームが担当することで、お客様の声にスピーディに対応いたします。" [level=3] [ref=e391]
        - paragraph [ref=e392]:
          - text: 一般的な代理店では原稿制作を外注に任せるケースも少なくありませんが、弊社は外注せず、社内のライターが採用コンサルタントと密に連携しながら原稿を制作しています。現場の声を直接反映させ、スピードと精度を両立させています。さらに、ただ求人情報を並べるのではなく、求職者の行動心理を踏まえた「応募につながる文章構成」を重視。ターゲット層に響く言葉選びやキャッチコピー、Indeed検索に最適化されたキーワードの活用など、細部にまでこだわった原稿作成を徹底しています。
          - text: また、専任のCS（カスタマーサクセス）チームが応募状況を徹底的に分析。業界特性や地域性を踏まえた“正しい視点”で数値を読み解き、改善点を明確にします。
          - text: CSチームにはIndeedをはじめとする各求人メディアの仕組みに精通したメンバーが在籍しており、効果的なキーワード選定や運用方法の最適化に強みを持っています。
      - img "私たちの強み" [ref=e394]

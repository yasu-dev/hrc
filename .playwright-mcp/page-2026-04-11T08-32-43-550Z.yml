            - text: 「真の課題解決」までサポートします
          - paragraph [ref=e90]: 株式会社人材総合サービスは、Indeed・リクルートの正規代理店として中途・新卒採用領域で数々の賞を受賞しています。20年超丁寧に積み上げた経験と実績を活かし、企業のパートナーとして「お客さまに寄り添う姿勢」を徹底しております。
          - paragraph [ref=e91]: 東京本社のみならず長野市に長野支社、那覇市に沖縄支社を開設。複数拠点のネットワークを最大限活かしながら、お客様の「真の課題解決」のパートナーとしてサポートさせていただきたいと考えています。
          - list [ref=e92]:

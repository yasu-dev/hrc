    - generic [ref=e234]:
      - generic [ref=e235]: 5 frame for DX
      - heading "DX推進を成功させる「5つの柱」" [level=3] [ref=e236]
      - paragraph [ref=e237]: DX（デジタルトランスフォーメーション）の成功の要素には、「戦略」、「先端技術」、「強靭なIT基盤」に加え、「確実な推進力」とそれを支える「研修・人材育成」が挙げられます。多くの企業がDXに対する関心を高めている中、自分たちの企業の中でDXに向けた取り組みをどこから始めたら良いのか、いざ始めてみたが思うように進まないと悩んでいる企業も少なくありません。 なぜ悩んでしまうのでしょうか？
      - paragraph [ref=e238]: DXは新たな事業構造への挑戦でありビジネスモデルの大きな転換でもあります。だからこそ、今まで経験したことの無い仕事のやり方が必要となり、「DX推進＝難しい」というパラドックスに陥ってしまうのではないでしょうか。
      - paragraph [ref=e239]: アイ・ティ・イノベーションは、これまで様々なDX推進の道を、多くのお客様と共に歩み、感動と喜びを共有してきました。蓄積してきた高い技術力、お客様と同じ視点で課題に取り組む姿勢、成功までやり遂げる行動力・・・。私たちの知見と理性と熱意を、お客様のDX推進に向けて、最大限に発揮します。

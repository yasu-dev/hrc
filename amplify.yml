version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - npm --version
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - env | grep -e NEXT_PUBLIC_ -e CONTACT_EMAIL_TO -e RECAPTCHA_SECRET_KEY >> .env.production || true
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
          - .npm/**/*
